name: Workspace-public
visibility: public
push_allowed: true
media_allowed: false
rules:
  - No private source names, watch targets, seed references, or collector configs.
  - No adult/source mappings or sensitive taxonomy.
  - No object-store credentials, local hostnames, or private service URLs.
  - No generated media, datasets, model weights, archives, or mounted storage.
  - Keep routes thin and move reusable behavior into packages.

