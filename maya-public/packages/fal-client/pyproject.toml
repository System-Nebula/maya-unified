[project]
name = "fal-client"
version = "0.1.0"
description = "Stability boundary for fal.ai async client — normalized submit/poll/retry"
requires-python = ">=3.11"
dependencies = ["structlog>=24.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fal_client_pkg"]
