[project]
name = "obs-client"
version = "0.1.0"
description = "Observability client — stateless, injectable config, no hardcoded hosts"
requires-python = ">=3.11"
dependencies = ["structlog>=24.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/obs_client"]
