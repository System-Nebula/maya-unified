services:
  comfyui-api:
    image: comfyui-api-local:latest
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: comfyui-api-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "8188:8188"
    volumes:
      - ${COMFY_HOME:-~/ComfyUI}/models:/app/ComfyUI/models:rw
      - ${COMFY_HOME:-~/ComfyUI}/custom_nodes:/app/ComfyUI/custom_nodes:rw
      - ${COMFY_HOME:-~/ComfyUI}/input:/app/ComfyUI/input:rw
      - ${COMFY_HOME:-~/ComfyUI}/user:/app/ComfyUI/user:rw
      - ${COMFY_HOME:-~/ComfyUI}/output:/app/ComfyUI/output:rw
      - ../workflows:/workflows:ro
      - ../cache:/root/.cache/comfyui-api:rw
      - ../manifest.yml:/app/manifest.yml:ro
    env_file:
      - ../.env
    environment:
      LOG_LEVEL: info
      MANIFEST: /app/manifest.yml
      MAX_QUEUE_DEPTH: "2"
      PUID: "1000"
      PGID: "1000"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: all
