services:
  comfyui-api:
    image: comfyui-api-local:latest
    build:
      context: .
      dockerfile: docker/api.dockerfile
    container_name: comfyui-api-dev
    restart: unless-stopped
    ports:
      - "3030:3000"
      - "8188:8188"
    volumes:
      - ${COMFY_HOME:-~/ComfyUI}/models:/opt/ComfyUI/models:rw
      - ${COMFY_HOME:-~/ComfyUI}/custom_nodes:/opt/ComfyUI/custom_nodes:rw
      - ${COMFY_HOME:-~/ComfyUI}/input:/opt/ComfyUI/input:rw
      - ${COMFY_HOME:-~/ComfyUI}/user:/opt/ComfyUI/user:rw
      - ${COMFY_HOME:-~/ComfyUI}/output:/opt/ComfyUI/output:rw
      - ../workflows:/workflows:ro
      - ../cache:/root/.cache/comfyui-api:rw
      - ../manifest.yml:/app/manifest.yml:ro
    env_file:
      - ../.env
    environment:
      COMFY_HOME: /opt/ComfyUI
      MODEL_DIR: /opt/ComfyUI/models
      INPUT_DIR: /opt/ComfyUI/input
      OUTPUT_DIR: /opt/ComfyUI/output
      LOG_LEVEL: info
      MANIFEST: /app/manifest.yml
      MAX_QUEUE_DEPTH: "2"
      PUID: "1000"
      PGID: "1000"
    ipc: host
    devices:
      - nvidia.com/gpu=all
