<!-- Maya Unified shell — include inside <body> on every dashboard page -->
<header class="mu-shell" x-data="mayaShell()" x-init="init()">
  <div class="mu-brand">Maya <span>Unified</span></div>
  <nav class="mu-nav">
    <a href="/" :class="{ active: s.page === 'dashboard' }">Dashboard</a>
    <a href="/memory" :class="{ active: s.page === 'memory' }">Memory</a>
    <a href="/settings" :class="{ active: s.page === 'settings' }">Settings</a>
    <a href="/docs" target="_blank" rel="noopener">API</a>
  </nav>
  <div class="mu-status">
    <span class="mu-chip" :class="s.chipClass()">
      <span class="dot"></span>
      <span x-text="s.label()"></span>
    </span>
    <span class="mu-hint" x-show="s.hint()" x-text="s.hint()"></span>
  </div>
</header>
