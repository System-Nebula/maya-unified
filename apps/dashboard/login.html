<!doctype html>
<html lang="en" data-maya-theme="unified" data-mv-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Maya Unified</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Chakra+Petch:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/dashboard/css/themes/theme-base.css" />
    <link rel="stylesheet" href="/dashboard/css/themes/theme-unified.css" />
    <link rel="stylesheet" href="/dashboard/css/themes/theme-industrial.css" />
    <link rel="stylesheet" href="/dashboard/css/themes/theme-brutalist.css" />
    <link rel="stylesheet" href="/dashboard/css/themes/theme-brutalist-dark.css" />
    <link rel="stylesheet" href="/dashboard/css/maya-login.css" />
    <style>body { margin: 0; }</style>
    <script src="/dashboard/js/mayaTheme.js"></script>
    <script src="/dashboard/js/mayaAuthAccess.js"></script>
  </head>
  <body>
    <div class="auth-root" x-data x-init="$store.mayaTheme.init(); $store.mayaAuth.init()">

      <!-- Unified — open door, email + OAuth -->
      <div class="ml-page" x-show="$store.mayaTheme.id !== 'industrial'" x-cloak>
        <div class="ml-bg">
          <div class="ml-blob ml-blob-1"></div>
          <div class="ml-blob ml-blob-2"></div>
          <div class="ml-blob ml-blob-3"></div>
        </div>

        <div class="ml-card" id="login-card" :class="{ shake: $store.mayaAuth.shaking }">
          <div class="ml-card-head">
            <h1 class="ml-title">Welcome to Maya Unified</h1>
            <div class="ml-hero">
              <div class="ml-mark" aria-hidden="true">
                <!-- Heroicons: arrow-right-on-rectangle (open door) -->
                <svg class="ml-door-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
                </svg>
              </div>
            </div>
            <p class="ml-subtitle">
              Sign in with email or a linked platform account.
            </p>
          </div>

          <div class="ml-error" x-show="$store.mayaAuth.error" x-text="$store.mayaAuth.error" x-cloak></div>

          <div class="ml-auth-stack">
            <section class="ml-auth-block">
              <h2 class="ml-auth-block-label">Email</h2>
              <form @submit.prevent="$store.mayaAuth.submitEmail()" id="login-form" novalidate>
                <div class="ml-field">
                  <div class="ml-row">
                    <div class="ml-row-icon" aria-hidden="true">
                      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                      </svg>
                    </div>
                    <input id="login-email" class="ml-row-input" type="email"
                      placeholder="you@example.com" autocomplete="email"
                      x-model="$store.mayaAuth.username" :disabled="$store.mayaAuth.loading" autofocus />
                  </div>
                </div>
                <div class="ml-field">
                  <div class="ml-row">
                    <div class="ml-row-icon" aria-hidden="true">
                      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                      </svg>
                    </div>
                    <div class="ml-row-input-wrap">
                      <input id="login-password" class="ml-row-input"
                        :type="$store.mayaAuth.showPw ? 'text' : 'password'"
                        placeholder="Password" autocomplete="current-password"
                        x-model="$store.mayaAuth.password" :disabled="$store.mayaAuth.loading" />
                    </div>
                    <button type="button" class="ml-toggle-btn" @click="$store.mayaAuth.showPw = !$store.mayaAuth.showPw"
                      :aria-label="$store.mayaAuth.showPw ? 'Hide password' : 'Show password'"
                      :aria-pressed="$store.mayaAuth.showPw" tabindex="-1">
                      <svg x-show="!$store.mayaAuth.showPw" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                      <svg x-show="$store.mayaAuth.showPw" x-cloak xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c6.5 0 10 7 10 7a16.66 16.66 0 0 1-1.67 2.68"/><path d="M6.61 6.61A16.66 16.66 0 0 0 2 12s3.5 7 10 7a9.12 9.12 0 0 0 2.1-.24"/><line x1="2" x2="22" y1="2" y2="22"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/></svg>
                    </button>
                  </div>
                </div>
                <button id="login-submit" class="ml-btn" type="submit" :disabled="$store.mayaAuth.loading">
                  <span x-show="$store.mayaAuth.loading" class="ml-spinner-wrap"><span class="ml-spinner"></span></span>
                  <span x-text="$store.mayaAuth.submitLabel()"></span>
                </button>
              </form>
            </section>

            <div class="ml-auth-divider" aria-hidden="true"><span>or continue with</span></div>

            <section class="ml-auth-block ml-auth-block--oauth">
              <button type="button" class="ml-oauth-btn"
                :disabled="!$store.mayaAuth.oauthAvailable || $store.mayaAuth.loading"
                @click="$store.mayaAuth.startOAuth('google')">
                <span class="ml-oauth-icon">
                  <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66 2.84-.62-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                  </svg>
                </span>
                <span>Sign in with Google</span>
                <span class="ml-oauth-chevron">›</span>
              </button>
              <button type="button" class="ml-oauth-btn"
                :disabled="!$store.mayaAuth.oauthAvailable || $store.mayaAuth.loading"
                @click="$store.mayaAuth.startOAuth('discord')">
                <span class="ml-oauth-icon">
                  <svg viewBox="0 0 127.14 96.36" width="18" height="18" fill="#5865F2" aria-hidden="true">
                    <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.33,46,96.22,53,91.08,65.69,84.69,65.69Z"/>
                  </svg>
                </span>
                <span>Sign in with Discord</span>
                <span class="ml-oauth-chevron">›</span>
              </button>
            </section>
          </div>
        </div>
      </div>

      <!-- Industrial — Stealth terminal, same three methods -->
      <div class="ind-auth-page" x-show="$store.mayaTheme.id === 'industrial'" x-cloak>
        <div class="ind-auth-scanlines" aria-hidden="true"></div>
        <div class="ind-auth-ambient" aria-hidden="true">
          <div class="ind-auth-glow-center"></div>
          <div class="ind-auth-hex"></div>
        </div>

        <div class="ind-auth-wrap">
          <div class="ind-auth-status">
            <div class="ind-auth-status-left">
              <span class="ind-auth-pulse" aria-hidden="true"></span>
              <!-- Heroicons: eye-slash (stealth) -->
              <svg class="ind-auth-stealth-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12c1.292 4.338 5.31 7.5 10.066 7.5.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
              </svg>
              <span class="ind-auth-status-label">Stealth Mode</span>
            </div>
            <span class="ind-auth-version">v0.1.0</span>
          </div>

          <div class="ind-auth-card">
            <span class="ind-auth-corner ind-auth-corner--tl" aria-hidden="true"></span>
            <span class="ind-auth-corner ind-auth-corner--tr" aria-hidden="true"></span>
            <span class="ind-auth-corner ind-auth-corner--bl" aria-hidden="true"></span>
            <span class="ind-auth-corner ind-auth-corner--br" aria-hidden="true"></span>

            <div class="ind-auth-body">
              <div class="ind-auth-head">
                <div class="ind-auth-eyebrow">System // Access</div>
                <h1 class="ind-auth-title" x-data="mayaIndustrialCursor" x-init="init()">
                  MAYA<span class="ind-auth-cursor" :style="{ opacity: on ? 1 : 0 }"></span>
                </h1>
                <p class="ind-auth-subtitle">Stealth Access Terminal</p>
                <div class="ind-auth-rule"></div>
              </div>

              <div class="ml-error" x-show="$store.mayaAuth.error" x-text="$store.mayaAuth.error" x-cloak style="margin-bottom:12px;"></div>

              <div class="ind-auth-stack">
                <section class="ind-auth-block">
                  <h2 class="ind-auth-block-label">// Email</h2>
                  <form class="ind-auth-email-fields" @submit.prevent="$store.mayaAuth.submitEmail()" novalidate>
                    <div class="ind-auth-notice">
                      <p>EMAIL CHANNEL — local credentials only.</p>
                    </div>
                    <div class="ml-row">
                      <input class="ml-row-input" type="email" placeholder="EMAIL" autocomplete="email"
                        x-model="$store.mayaAuth.username" :disabled="$store.mayaAuth.loading" autofocus />
                    </div>
                    <div class="ml-row">
                      <input class="ml-row-input" :type="$store.mayaAuth.showPw ? 'text' : 'password'"
                        placeholder="PASSWORD" autocomplete="current-password"
                        x-model="$store.mayaAuth.password" :disabled="$store.mayaAuth.loading" />
                    </div>
                    <button class="ml-btn" type="submit" :disabled="$store.mayaAuth.loading">
                      <span x-text="$store.mayaAuth.submitLabel()"></span>
                    </button>
                  </form>
                </section>

                <div class="ind-auth-divider" aria-hidden="true"><span>// or continue with</span></div>

                <section class="ind-auth-block ind-auth-block--oauth">
                  <div class="ind-auth-oauth-list">
                    <button type="button" class="ind-auth-oauth-btn"
                      :disabled="!$store.mayaAuth.oauthAvailable || $store.mayaAuth.loading"
                      @click="$store.mayaAuth.startOAuth('google')">
                      <span class="ind-auth-oauth-icon">
                        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66 2.84-.62-.62z" fill="#FBBC05"/>
                          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                      </span>
                      <span>Authenticate via Google</span>
                      <span class="ind-auth-oauth-chevron">›</span>
                    </button>
                    <button type="button" class="ind-auth-oauth-btn"
                      :disabled="!$store.mayaAuth.oauthAvailable || $store.mayaAuth.loading"
                      @click="$store.mayaAuth.startOAuth('discord')">
                      <span class="ind-auth-oauth-icon">
                        <svg viewBox="0 0 127.14 96.36" width="16" height="16" fill="currentColor" style="color: #5865F2" aria-hidden="true">
                          <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.33,46,96.22,53,91.08,65.69,84.69,65.69Z"/>
                        </svg>
                      </span>
                      <span>Authenticate via Discord</span>
                      <span class="ind-auth-oauth-chevron">›</span>
                    </button>
                  </div>
                </section>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="mt-theme-picker mt-theme-picker--footer" x-data="mayaThemePicker">
        <template x-for="t in themes" :key="t.id">
          <button type="button" class="mt-theme-btn" :class="{ active: activeId === t.id }" @click="pick(t.id)" x-text="t.label"></button>
        </template>
      </div>
    </div>

    <script defer src="/sdk/vendor/alpine.min.js"></script>
  </body>
</html>
