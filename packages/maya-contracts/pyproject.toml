[project]
name = "maya-contracts"
version = "0.1.0"
description = "Pydantic schema source of truth for all Maya public APIs"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/maya_contracts"]
