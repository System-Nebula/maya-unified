[project]
name = "maya-research"
version = "0.1.0"
description = "LangGraph research agent — coordinator, planner, parallel sources, synthesis, persistence"
requires-python = ">=3.11"
dependencies = [
    "maya-contracts",
    "maya-db",
    "maya-graph",
    "httpx>=0.27",
    "langgraph>=0.2",
    "pydantic>=2.0",
    "sqlalchemy>=2.0",
]

[tool.uv.sources]
maya-contracts = { workspace = true }
maya-db = { workspace = true }
maya-graph = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/maya_research"]

[project.optional-dependencies]
extract = ["trafilatura>=2.0"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
