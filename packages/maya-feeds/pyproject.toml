[project]
name = "maya-feeds"
version = "0.1.0"
description = "Platform feed adapters — YouTube Atom, Instagram, TikTok. Generic + public-safe."
requires-python = ">=3.11"
dependencies = [
    "maya-contracts",
    "feedparser>=6.0",
    "httpx>=0.27",
    "google-api-python-client>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/maya_feeds"]
