[project]
name = "arena-core"
version = "0.1.0"
description = "ELO math, battle logic, and leaderboard computation — zero private-data risk"
requires-python = ">=3.11"
dependencies = ["structlog>=24.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/arena_core"]
