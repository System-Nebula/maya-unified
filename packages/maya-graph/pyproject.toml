[project]
name = "maya-graph"
version = "0.1.0"
description = "Entity resolution + property-graph helpers. Generic + public-safe."
requires-python = ">=3.11"
dependencies = [
    "maya-contracts",
    "rapidfuzz>=3.6",
    "asyncpg>=0.29",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/maya_graph"]

[tool.uv.sources]
maya-contracts = { workspace = true }
