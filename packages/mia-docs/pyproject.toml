[project]
name = "mia-docs"
version = "0.1.0"
description = "AtomicNote knowledge base: deterministic ingest (sk mine), hybrid retrieval (sk query), vault materializer"
requires-python = ">=3.11"
dependencies = [
    "maya-db",
    "sqlalchemy>=2.0",
    "psycopg2-binary>=2.9",
    "pgvector>=0.3",
    "typer>=0.12",
    "pymupdf>=1.24",
    "rapidfuzz>=3.6",
    "rank-bm25>=0.2",
]

[project.optional-dependencies]
embed = [
    "sentence-transformers>=3.0",
]

[project.scripts]
sk = "mia_docs.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mia_docs"]

[tool.uv.sources]
maya-db = { workspace = true }
