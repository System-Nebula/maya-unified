name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Cache Quartz plugins
        uses: actions/cache@v4
        with:
          path: docs/.quartz/plugins
          key: ${{ runner.os }}-quartz-plugins-${{ hashFiles('docs/quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-quartz-plugins-

      - name: Install dependencies
        run: npm ci

      - name: Install Quartz plugins
        run: npm run install-plugins

      - name: Build site
        run: npx tsx ./quartz/bootstrap-cli.mjs build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/public
          force_orphan: true
