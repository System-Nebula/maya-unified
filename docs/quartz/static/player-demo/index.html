<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Player Demo</title>
    <link rel="stylesheet" href="tokens.css" />
    <link rel="stylesheet" href="demo.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script defer src="mayaWaveform.js"></script>
    <script defer src="demo.js"></script>
  </head>
  <body>
    <div
      class="player-root preset-compact demo-player player-shell"
      x-data="mayaPlayerDemo()"
      x-init="init()"
      :style="accentStyle"
    >
      <p class="demo-label">Interactive demo · synthetic audio</p>

      <audio
        x-ref="audio"
        class="demo-audio-engine"
        preload="metadata"
        @play="onPlay()"
        @pause="onPause()"
        @timeupdate="onTime()"
        @loadedmetadata="onMeta()"
        @durationchange="onMeta()"
      ></audio>

      <div
        class="demo-body"
        :class="trayOpen ? 'demo-body--volume-open' : ''"
        x-data="mayaVolumeControl()"
        @click.outside="trayOpen = false"
      >
        <div class="demo-main">
      <div class="demo-top">
        <div class="demo-art" aria-hidden="true">♪</div>

        <div class="demo-meta">
          <span class="demo-genre" x-text="currentTrack?.genre"></span>
          <span class="demo-title" x-text="currentTrack?.title"></span>
          <span class="demo-artist" x-text="currentTrack?.artist"></span>
          <div class="demo-chips">
            <span class="demo-chip demo-chip--accent" x-text="currentTrack?.bpm + ' BPM'"></span>
            <span class="demo-chip demo-chip--muted" x-text="currentTrack?.key"></span>
          </div>
        </div>

        <div class="demo-wave-col">
          <div
            x-data="mayaWaveform()"
            x-init="init()"
            @destroy="destroy()"
            @mouseleave="hoverProgress = null"
            class="player-waveform-wrap"
            style="padding: 0; min-height: 48px"
          >
            <canvas
              x-ref="canvas"
              class="player-waveform-canvas"
              @click="onClick($event)"
              @mousemove="onMouseMove($event)"
            ></canvas>
          </div>
        </div>

        <div class="demo-time-col">
          <span class="demo-time-current" x-text="fmtTime(currentTime)"></span>
          <span class="demo-time-remain" x-text="'−' + fmtTime(remaining)"></span>
        </div>
      </div>

      <div class="player-divider"></div>

      <div class="demo-controls">
        <div class="player-btn-strip">
        <button
          type="button"
          class="player-btn-strip-item"
          :class="shuffle ? 'is-active' : ''"
          title="Shuffle"
          @click="toggleShuffle()"
        >
          <svg class="demo-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m18 14 4 4-4 4" />
            <path d="m18 2 4 4-4 4" />
            <path d="M2 18h1.397a5 5 0 0 0 4.096-2.13l4.013-7.014a5 5 0 0 1 4.096-2.13H18" />
            <path d="M2 6h1.972a5 5 0 0 1 4.6 3.046" />
            <path d="M22 18h-1.984a5 5 0 0 1-4.6-3.046" />
          </svg>
        </button>

        <button type="button" class="player-btn-strip-item" title="Previous" @click="prev()">
          <svg class="demo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <rect x="5" y="5" width="2.5" height="14" rx="0.5" />
            <polygon points="19 20 9 12 19 4" />
          </svg>
        </button>

        <button
          type="button"
          class="player-btn-strip-item player-btn-strip-item--play player-btn-play"
          :class="playing ? 'is-playing' : ''"
          title="Play / Pause"
          @click="togglePlay()"
        >
          <svg x-show="!playing" class="demo-icon demo-icon--play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <polygon points="8 6 18 12 8 18" />
          </svg>
          <svg x-show="playing" class="demo-icon demo-icon--play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <rect x="7" y="5" width="3.5" height="14" rx="0.5" />
            <rect x="13.5" y="5" width="3.5" height="14" rx="0.5" />
          </svg>
        </button>

        <button type="button" class="player-btn-strip-item" title="Next" @click="next()">
          <svg class="demo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <polygon points="5 4 15 12 5 20" />
            <rect x="16.5" y="5" width="2.5" height="14" rx="0.5" />
          </svg>
        </button>

        <button
          type="button"
          class="player-btn-strip-item"
          :class="repeat ? 'is-active' : ''"
          title="Repeat"
          @click="toggleRepeat()"
        >
          <svg class="demo-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m17 2 4 4-4 4" />
            <path d="M3 11v-1a4 4 0 0 1 4-4h14" />
            <path d="m7 22-4-4 4-4" />
            <path d="M21 13v1a4 4 0 0 1-4 4H3" />
          </svg>
        </button>
        </div>

        <div class="demo-controls-spacer"></div>

        <button
          type="button"
          class="demo-volume-btn player-btn-strip-solo"
          :class="trayOpen ? 'is-open is-active' : ''"
          :title="'Volume — ' + volume + '%'"
          @click="toggleTray()"
          :aria-expanded="trayOpen"
        >
          <svg
            class="demo-icon demo-icon--volume player-volume-speaker"
            :class="!isMuted && volume > 0 ? 'is-active' : ''"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            aria-hidden="true"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M11 5L6 9H2v6h4l5 4V5z"></path>
            <path x-show="isMuted || volume === 0" stroke-linecap="round" stroke-linejoin="round" d="M19 9l-6 6m0-6l6 6"></path>
            <path x-show="!isMuted && volume > 0" stroke-linecap="round" stroke-linejoin="round" d="M15.54 8.46a5 5 0 010 7.07"></path>
            <path x-show="!isMuted && volume > 50" stroke-linecap="round" stroke-linejoin="round" d="M19.07 4.93a10 10 0 010 14.14"></path>
          </svg>
        </button>

        <button
          type="button"
          class="demo-queue-btn player-btn-strip-solo"
          :class="queueOpen ? 'is-open player-queue-toggle is-active' : ''"
          :title="'Show queue (' + tracks.length + ' tracks)'"
          @click="toggleQueue()"
        >
          <svg class="demo-icon demo-icon--queue" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12M8.25 17.25h6" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h.008v.008H3.75V6.75Zm0 5.25h.008v.008H3.75v-.008Zm0 5.25h.008v.008H3.75v-.008Z" />
          </svg>
        </button>
      </div>
        </div>

        <div class="demo-volume-rail mp-volume-rail" x-show="trayOpen" x-cloak @click.stop>
          <div class="player-volume-groove player-volume-groove--vertical player-volume-groove--full">
            <div class="player-volume-groove-track"></div>
            <div class="player-volume-fill" :style="{ height: volume + '%' }"></div>
            <input
              type="range"
              class="player-volume-mixer player-volume-mixer--vertical"
              min="0"
              max="100"
              step="1"
              :value="volume"
              @input="setVolumePercent($event.target.value)"
              aria-label="Volume"
            />
          </div>
          <div class="demo-volume-rail-foot mp-volume-rail-foot">
            <button type="button" class="mp-volume-mute-btn" @click="toggleMute()" title="Mute / unmute">
              <span x-text="isMuted ? 'Unmute' : 'Mute'"></span>
            </button>
            <span
              x-show="!isEditing"
              class="player-volume-pct"
              @click="startEditing()"
              title="Click to manually enter volume"
            ><span x-text="volume"></span>%</span>
            <input
              x-show="isEditing"
              x-ref="volInput"
              type="number"
              class="player-volume-pct-input"
              min="0"
              max="100"
              :value="volume"
              @input="setVolumePercent($event.target.value)"
              @blur="finishEditing()"
              @keydown.enter="finishEditing()"
            />
          </div>
        </div>
      </div>

      <div class="demo-queue" x-show="queueOpen" x-cloak>
        <div class="demo-queue-head">Up Next</div>
        <template x-for="(tr, i) in tracks" :key="tr.id">
          <div
            class="demo-queue-row player-queue-row"
            :class="trackIdx === i ? 'is-active' : ''"
            @click="selectTrack(i)"
          >
            <div
              class="player-mini-waveform"
              x-init="$nextTick(() => drawQueueMini($el, tr, i))"
            ></div>
            <span class="demo-queue-title" x-text="tr.title"></span>
            <span class="demo-queue-meta" x-text="tr.bpm"></span>
            <span class="demo-queue-meta" x-text="fmtTime(tr.duration)"></span>
            <div class="demo-eq" x-show="trackIdx === i && playing">
              <span style="height: 60%"></span>
              <span style="height: 100%"></span>
              <span style="height: 40%"></span>
              <span style="height: 80%"></span>
            </div>
          </div>
        </template>
      </div>
    </div>
  </body>
</html>
